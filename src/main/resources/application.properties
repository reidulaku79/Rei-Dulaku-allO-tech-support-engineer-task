spring.application.name=orderdesk

# In-memory database: schema and demo data are dropped and recreated on every startup.
spring.datasource.url=jdbc:h2:mem:orderdesk;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.open-in-view=true

# Browse the database at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:orderdesk)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.error.include-message=always
server.error.include-binding-errors=always
